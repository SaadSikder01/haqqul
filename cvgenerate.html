<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Maker - Fill Info</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; font-size: 28px; }
        h2 { color: #333; border-bottom: 2px solid #1a73e8; padding-bottom: 5px; margin: 25px 0 15px; font-size: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: 600; color: #444; font-size: 15px; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 8px;
            transition: border 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
        }
        textarea { resize: vertical; min-height: 80px; }
        .row { display: flex; gap: 15px; flex-wrap: wrap; }
        .row > div { flex: 1; min-width: 200px; }
        .entry-block {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
            border: 1px solid #e0e0e0;
        }
        .remove-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 16px;
            line-height: 28px;
            text-align: center;
            transition: background 0.2s;
        }
        .remove-btn:hover { background: #c0392b; }
        .add-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px 0 15px;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .add-btn:hover { background: #1557b0; }
        .generate-btn {
            background: #0d9e6c;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            transition: background 0.2s;
            font-weight: bold;
        }
        .generate-btn:hover { background: #0b7d55; }
        .photo-preview {
            width: 110px;
            height: 140px;
            border: 2px dashed #aaa;
            border-radius: 8px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fafafa;
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .note { font-size: 12px; color: #888; margin-top: 3px; }
        .checkbox-group { display: flex; align-items: center; gap: 5px; margin: 5px 0; }
        .checkbox-group label { font-weight: normal; margin: 0; }

        /* Readymade Objective Toggle */
        .readymade-toggle-container {
            background: linear-gradient(135deg, #f0f7ff 0%, #e0efff 100%);
            border: 2px solid #1a73e8;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            flex-wrap: wrap;
        }
        .readymade-toggle-container:hover {
            box-shadow: 0 4px 12px rgba(26,115,232,0.2);
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 28px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #1a73e8;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .toggle-label {
            font-weight: 700;
            font-size: 17px;
            color: #1a3b5c;
        }
        .toggle-desc {
            font-size: 14px;
            color: #555;
            margin-top: 2px;
        }

        /* Language grid */
        .lang-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            align-items: end;
        }
        .lang-grid .remove-btn {
            position: static;
            margin-bottom: 5px;
        }

        /* Skill toggle blocks */
        .skill-toggle-block {
            background: #f0f4ff;
            border: 1px solid #c0d0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .skill-toggle-block .toggle-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .skill-toggle-block .toggle-header input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #1a73e8;
        }
        .skill-toggle-block .toggle-header label {
            font-size: 17px;
            font-weight: 600;
            color: #1a3b5c;
            margin: 0;
            cursor: pointer;
        }
        .skill-detail {
            display: none;
            margin-top: 8px;
        }

        /* Mobile responsiveness improvements */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px 15px; }
            h1 { font-size: 24px; }
            h2 { font-size: 18px; }
            .row { flex-direction: column; gap: 0; }
            .row > div { min-width: 100%; }
            .readymade-toggle-container {
                flex-direction: column;
                align-items: flex-start;
            }
            .lang-grid {
                grid-template-columns: 1fr 1fr;
            }
            .generate-btn { width: 100%; }
            /* Enlarge touch targets */
            input, textarea, select {
                padding: 14px;
                font-size: 16px; /* prevent zoom */
            }
            .add-btn {
                padding: 12px 20px;
                width: 100%;
                justify-content: center;
            }
            .entry-block {
                padding: 12px;
            }
            .photo-preview {
                width: 100px;
                height: 125px;
            }
        }

        @media (max-width: 480px) {
            .toggle-label { font-size: 16px; }
            .lang-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Professional CV Maker</h1>
        <form id="cvForm">
            <!-- Personal Info -->
            <h2>Personal Information</h2>
            <div class="row">
                <div><label>Full Name *</label><input type="text" id="fullName" placeholder="Md. Rahim Uddin" required></div>
                <div><label>Profession</label><input type="text" id="profession" placeholder="Software Engineer"></div>
            </div>
            <div class="row">
                <div><label>Email</label><input type="email" id="email" placeholder="rahim@example.com"></div>
                <div><label>Phone</label><input type="tel" id="phone" placeholder="+880 1712-345678"></div>
            </div>
            <div class="row">
                <div><label>Location</label><input type="text" id="location" placeholder="Dhaka, Bangladesh"></div>
                <div><label>LinkedIn (optional)</label><input type="url" id="linkedin" placeholder="https://linkedin.com/in/rahim"></div>
            </div>
            <div class="row">
                <div>
                    <label>Passport Size Photo</label>
                    <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto()">
                    <div class="photo-preview" id="photoPreview"></div>
                    <span class="note">Will be resized to passport size automatically</span>
                </div>
                <div></div>
            </div>

            <!-- Additional Details -->
            <h2>Additional Details</h2>
            <div class="row">
                <div><label>Father's Name</label><input type="text" id="fatherName" placeholder="Md. Karim Uddin"></div>
                <div><label>Mother's Name</label><input type="text" id="motherName" placeholder="Mst. Fatema Begum"></div>
            </div>
            <div class="row">
                <div><label>Date of Birth</label><input type="text" id="dob" placeholder="15 July 1998"></div>
                <div><label>Blood Group</label><input type="text" id="bloodGroup" placeholder="O+"></div>
            </div>
            <div class="row">
                <div><label>Gender</label>
                    <select id="gender">
                        <option value="">--Select--</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <div><label>Marital Status</label>
                    <select id="maritalStatus">
                        <option value="">--Select--</option>
                        <option>Single</option>
                        <option>Married</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div><label>Nationality</label><input type="text" id="nationality" placeholder="Bangladeshi"></div>
                <div><label>Religion</label><input type="text" id="religion" placeholder="Islam"></div>
            </div>
            <div class="row">
                <div><label>Present Address</label><textarea id="presentAddress" placeholder="House 12, Road 5, Dhanmondi, Dhaka-1209"></textarea></div>
                <div><label>Permanent Address</label><textarea id="permanentAddress" placeholder="Village: Rajapur, Post: Kaliganj, Dist: Jhenaidah"></textarea></div>
            </div>

            <!-- Objective -->
            <h2>Objective</h2>
            <div class="readymade-toggle-container">
                <label class="toggle-switch">
                    <input type="checkbox" id="useReadymadeObj" onchange="toggleReadymadeObjective()">
                    <span class="slider"></span>
                </label>
                <div>
                    <div class="toggle-label">Use a ready-made objective</div>
                    <div class="toggle-desc">Automatically fill a professional career objective</div>
                </div>
            </div>
            <textarea id="objective" placeholder="Write your career objective..."></textarea>

            <!-- Job Experience -->
            <h2>Job Experience</h2>
            <div id="experienceContainer">
                <div class="entry-block">
                    <button type="button" class="remove-btn" onclick="removeEntry(this)">×</button>
                    <div class="row">
                        <div><label>Job Name</label><input type="text" class="exp-title" placeholder="Software Engineer"></div>
                        <div><label>Institute</label><input type="text" class="exp-institute" placeholder="ABC Tech Ltd."></div>
                    </div>
                    <div class="row">
                        <div><label>Start Date</label><input type="text" class="exp-start" placeholder="Jan 2020"></div>
                        <div>
                            <label>End Date</label>
                            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                                <input type="text" class="exp-end" placeholder="e.g., Dec 2023" style="flex:1; min-width:120px;">
                                <label class="checkbox-group" style="white-space:nowrap;">
                                    <input type="checkbox" class="exp-current" onchange="toggleCurrentJob(this)"> Till Now
                                </label>
                            </div>
                        </div>
                    </div>
                    <label>Description</label>
                    <textarea class="exp-desc" placeholder="Developed and maintained web applications..."></textarea>
                </div>
            </div>
            <button type="button" class="add-btn" onclick="addExperience()">+ Add Another Job Experience</button>

            <!-- Education -->
            <h2>Education</h2>
            <div id="educationContainer">
                <div class="entry-block">
                    <button type="button" class="remove-btn" onclick="removeEntry(this)">×</button>
                    <div class="row">
                        <div><label>Degree</label><input type="text" class="edu-degree" placeholder="B.Sc. in Computer Science"></div>
                        <div><label>Institution</label><input type="text" class="edu-school" placeholder="University of Dhaka"></div>
                    </div>
                    <div class="row">
                        <div><label>Year</label><input type="text" class="edu-year" placeholder="2020"></div>
                        <div><label>Grade / CGPA</label><input type="text" class="edu-grade" placeholder="3.85 out of 4.00"></div>
                    </div>
                </div>
            </div>
            <button type="button" class="add-btn" onclick="addEducation()">+ Add Another Education</button>

            <!-- Generic Skills -->
            <h2>Skills</h2>
            <textarea id="skills" placeholder="HTML, CSS, JavaScript, React, Node.js, Python"></textarea>

            <!-- Computer Skills -->
            <div class="skill-toggle-block">
                <div class="toggle-header">
                    <input type="checkbox" id="hasComputerSkills" onchange="toggleSkillSection('computerSkillsDetail', this)">
                    <label for="hasComputerSkills">🖥️ I have Computer Skills</label>
                </div>
                <div class="skill-detail" id="computerSkillsDetail">
                    <label>List your computer skills</label>
                    <textarea id="computerSkillsText" placeholder="MS Word, Excel, PowerPoint, Internet Browsing, etc."></textarea>
                </div>
            </div>

            <!-- Driving License -->
            <div class="skill-toggle-block">
                <div class="toggle-header">
                    <input type="checkbox" id="hasDrivingLicense" onchange="toggleSkillSection('drivingLicenseDetail', this)">
                    <label for="hasDrivingLicense">🚗 I have a Driving License</label>
                </div>
                <div class="skill-detail" id="drivingLicenseDetail">
                    <label>Driving license details</label>
                    <input type="text" id="drivingLicenseText" placeholder="e.g., Light Motor Vehicle, License No: 12345">
                </div>
            </div>

            <!-- Other Skills -->
            <div class="skill-toggle-block">
                <div class="toggle-header">
                    <input type="checkbox" id="hasOtherSkills" onchange="toggleSkillSection('otherSkillsDetail', this)">
                    <label for="hasOtherSkills">🔧 I have Other Skills</label>
                </div>
                <div class="skill-detail" id="otherSkillsDetail">
                    <label>Describe your other skills</label>
                    <textarea id="otherSkillsText" placeholder="e.g., Event Management, Public Speaking..."></textarea>
                </div>
            </div>

            <!-- Language Skills -->
            <h2>Language Skills</h2>
            <div id="languageContainer">
                <div class="entry-block lang-entry">
                    <button type="button" class="remove-btn" onclick="removeEntry(this)">×</button>
                    <div class="lang-grid">
                        <div><label>Language</label><input type="text" class="lang-name" placeholder="Bangla"></div>
                        <div><label>Reading</label>
                            <select class="lang-reading">
                                <option>Perfect</option>
                                <option>Good</option>
                                <option>Excellent</option>
                            </select>
                        </div>
                        <div><label>Writing</label>
                            <select class="lang-writing">
                                <option>Perfect</option>
                                <option>Good</option>
                                <option>Excellent</option>
                            </select>
                        </div>
                        <div><label>Speaking</label>
                            <select class="lang-speaking">
                                <option>Perfect</option>
                                <option>Good</option>
                                <option>Excellent</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <button type="button" class="add-btn" onclick="addLanguage()">+ Add More Language Skill</button>

            <button type="submit" class="generate-btn">✨ Generate CV</button>
        </form>
    </div>

    <script>
        let photoDataURL = null;
        const readymadeObjective = `To develop career in dynamic and challenging environment where hard work, strict discipline, sincerity is welcomed. I have a desire to give my full effort in the job so that the institute can make profit that will facilitate achieving my own goal too.`;

        // Toggle readymade objective
        function toggleReadymadeObjective() {
            const checkbox = document.getElementById('useReadymadeObj');
            const textarea = document.getElementById('objective');
            if (checkbox.checked) {
                textarea.value = readymadeObjective;
                textarea.setAttribute('readonly', true);
                textarea.style.background = "#f4f9ff";
            } else {
                textarea.value = '';
                textarea.removeAttribute('readonly');
                textarea.style.background = "";
            }
        }

        // Toggle skill sections
        function toggleSkillSection(detailId, checkbox) {
            const detail = document.getElementById(detailId);
            if (checkbox.checked) {
                detail.style.display = "block";
            } else {
                detail.style.display = "none";
                const input = detail.querySelector("input, textarea");
                if (input) input.value = '';
            }
        }

        function previewPhoto() {
            const file = document.getElementById('photoInput').files[0];
            const preview = document.getElementById('photoPreview');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    photoDataURL = e.target.result;
                    preview.innerHTML = `<img src="${photoDataURL}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            } else {
                photoDataURL = null;
                preview.innerHTML = '';
            }
        }

        function toggleCurrentJob(checkbox) {
            const endInput = checkbox.closest('.entry-block').querySelector('.exp-end');
            if (checkbox.checked) {
                endInput.value = 'Present';
                endInput.setAttribute('readonly', true);
            } else {
                endInput.value = '';
                endInput.removeAttribute('readonly');
            }
        }

        function addExperience() {
            const container = document.getElementById('experienceContainer');
            const template = container.firstElementChild;
            const newEntry = template.cloneNode(true);
            newEntry.querySelectorAll('input, textarea').forEach(input => {
                if (input.type !== 'checkbox') input.value = '';
            });
            const cb = newEntry.querySelector('.exp-current');
            if (cb) cb.checked = false;
            const endInput = newEntry.querySelector('.exp-end');
            if (endInput) endInput.removeAttribute('readonly');
            container.appendChild(newEntry);
        }

        function addEducation() {
            const container = document.getElementById('educationContainer');
            const newEntry = container.firstElementChild.cloneNode(true);
            newEntry.querySelectorAll('input, textarea').forEach(input => input.value = '');
            container.appendChild(newEntry);
        }

        function addLanguage() {
            const container = document.getElementById('languageContainer');
            const template = container.querySelector('.lang-entry');
            const newEntry = template.cloneNode(true);
            newEntry.querySelectorAll('input').forEach(input => input.value = '');
            newEntry.querySelectorAll('select').forEach(select => select.selectedIndex = 0);
            container.appendChild(newEntry);
        }

        function removeEntry(btn) {
            const container = btn.closest('.entry-block').parentElement;
            if (container.children.length > 1) {
                btn.closest('.entry-block').remove();
            } else {
                alert("At least one entry is required.");
            }
        }

        document.getElementById('cvForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const useReadymade = document.getElementById('useReadymadeObj').checked;
            const objectiveText = useReadymade ? readymadeObjective : document.getElementById('objective').value.trim();

            // Skill toggles
            const hasComputerSkills = document.getElementById('hasComputerSkills').checked;
            const computerSkillsText = hasComputerSkills ? document.getElementById('computerSkillsText').value.trim() : '';
            const hasDrivingLicense = document.getElementById('hasDrivingLicense').checked;
            const drivingLicenseText = hasDrivingLicense ? document.getElementById('drivingLicenseText').value.trim() : '';
            const hasOtherSkills = document.getElementById('hasOtherSkills').checked;
            const otherSkillsText = hasOtherSkills ? document.getElementById('otherSkillsText').value.trim() : '';

            const cvData = {
                fullName: document.getElementById('fullName').value.trim(),
                profession: document.getElementById('profession').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                location: document.getElementById('location').value.trim(),
                linkedin: document.getElementById('linkedin').value.trim(),
                photo: photoDataURL,
                fatherName: document.getElementById('fatherName').value.trim(),
                motherName: document.getElementById('motherName').value.trim(),
                dob: document.getElementById('dob').value.trim(),
                bloodGroup: document.getElementById('bloodGroup').value.trim(),
                gender: document.getElementById('gender').value,
                maritalStatus: document.getElementById('maritalStatus').value,
                nationality: document.getElementById('nationality').value.trim(),
                religion: document.getElementById('religion').value.trim(),
                presentAddress: document.getElementById('presentAddress').value.trim(),
                permanentAddress: document.getElementById('permanentAddress').value.trim(),
                objective: objectiveText,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s),
                computerSkills: hasComputerSkills ? computerSkillsText : '',
                drivingLicense: hasDrivingLicense ? drivingLicenseText : '',
                otherSkills: hasOtherSkills ? otherSkillsText : '',
                experiences: [],
                educations: [],
                languages: []
            };

            document.querySelectorAll('#experienceContainer .entry-block').forEach(block => {
                const title = block.querySelector('.exp-title').value.trim();
                const institute = block.querySelector('.exp-institute').value.trim();
                const start = block.querySelector('.exp-start').value.trim();
                const endInput = block.querySelector('.exp-end');
                const end = endInput.value.trim();
                const current = block.querySelector('.exp-current').checked;
                const description = block.querySelector('.exp-desc').value.trim();
                if (title || institute) {
                    cvData.experiences.push({ title, institute, start, end: current ? 'Present' : end, currentJob: current, description });
                }
            });

            document.querySelectorAll('#educationContainer .entry-block').forEach(block => {
                const degree = block.querySelector('.edu-degree').value.trim();
                const school = block.querySelector('.edu-school').value.trim();
                const year = block.querySelector('.edu-year').value.trim();
                const grade = block.querySelector('.edu-grade').value.trim();
                if (degree || school) cvData.educations.push({ degree, school, year, grade });
            });

            document.querySelectorAll('#languageContainer .lang-entry').forEach(block => {
                const name = block.querySelector('.lang-name').value.trim();
                const reading = block.querySelector('.lang-reading').value;
                const writing = block.querySelector('.lang-writing').value;
                const speaking = block.querySelector('.lang-speaking').value;
                if (name) cvData.languages.push({ name, reading, writing, speaking });
            });

            if (!cvData.fullName) {
                alert("Full Name is required.");
                return;
            }

            localStorage.setItem('cvData', JSON.stringify(cvData));
            window.location.href = 'cv.html';
        });
    </script>
</body>
</html>
