<!DOCTYPE html>
<html>
  <head>
    <style>
      #title{
        color:#66ccff;
        text-align:center;
        animation: scroll 10s linear 1;
      }
      #container{
        width:100%;
        height:80px;
        position:absolute;
        top:0;
        left:0;
        background: blue;
      }
      @keyframes scroll{
        0%{
          transform: translateX(100%);
        }
        100%{
          transform: translateX(-100%);
        }
      }
    </style>
  </head>
  <body>
<div id = "container">
      <h1 id="title">Wait Until Server Connect</h1>
</div>
  </body>
</html>
